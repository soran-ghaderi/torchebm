{% extends "base.html" %}

{% block extrahead %}
  <meta name="google-site-verification" content="iy_Kc5UEJ0ls_AP4oXtSSr8F3Vudo6LP933qWL3Tnfk" />

  {% if page %}
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ page.meta.get('title', page.title) or config.site_name }}" />
  <meta property="og:description" content="{{ page.meta.get('description', '') or config.site_description }}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta property="og:image" content="{{ config.site_url }}assets/images/social_card.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="{{ config.site_name }}" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.meta.get('title', page.title) or config.site_name }}" />
  <meta name="twitter:description" content="{{ page.meta.get('description', '') or config.site_description }}" />
  <meta name="twitter:image" content="{{ config.site_url }}assets/images/social_card.png" />
  {% endif %}
{% endblock %}
