# $schema: https://squidfunk.github.io/mkdocs-material/schema.json

site_name: TorchEBM
site_url: https://soran-ghaderi.github.io/torchebm/
site_description: Energy-Based Modeling library for PyTorch
site_author: Soran Ghaderi
repo_url: https://github.com/soran-ghaderi/torchebm
repo_name: soran-ghaderi/torchebm
edit_uri: edit/main/docs/
copyright: Copyright © 2025 Soran Ghaderi. Licensed under the MIT License.

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/images/nabla_icon.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.tooltips
    - header.autohide
    - announce.dismiss
    - navigation.footer
  palette:
    # Palette toggle for dark mode (default)
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  font: false
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: fontawesome/solid/note-sticky
      abstract: fontawesome/solid/book
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/bullhorn
      success: fontawesome/solid/check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/bomb
      danger: fontawesome/solid/skull
      bug: fontawesome/solid/robot
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
#  logo: simple/pytorch
#  favicon: simple/pytorch

nav:
  - Home: index.md
  - Tutorials:
    - tutorials/index.md
    - Getting Started: tutorials/getting_started.md
    - Samplers: tutorials/samplers.md
    - Loss Functions: tutorials/loss_functions.md
    - Training EBMs: tutorials/training.md
    - Visualization: tutorials/visualization.md
    - Advanced:
      - Custom Neural Networks: tutorials/custom_neural_networks.md
      - Parallel Sampling: tutorials/parallel_sampling.md
  - API Reference:
    - api/index.md
  - Examples:
    - Overview: examples/index.md
    - Datasets: examples/datasets/index.md
    - Samplers: examples/samplers/index.md
    - Training EBMs: examples/training/index.md
    - Visualization: examples/visualization/index.md
  - Developer Guide:
    - Overview: developer_guide/index.md
    - Getting Started: developer_guide/getting_started.md
    - Code Guidelines: developer_guide/code_guidelines.md
    - Architecture: developer_guide/architecture.md
    - Performance: developer_guide/performance.md
  - Benchmarks:
    - benchmarks/index.md
    - Results: benchmarks/results.md
    - Interactive Dashboard: benchmarks/dashboard.md
  - Blog: blog/index.md
  - FAQ: faq.md

hooks:
  - docs/hooks/socialmedia.py
  - docs/hooks/benchmarks.py

plugins:
  - search
  - literate-nav:
      nav_file: SUMMARY.md
  - llmstxt:
      markdown_description: |
        TorchEBM is an Energy-Based Modeling library for PyTorch that provides tools for 
        sampling, inference, and learning in complex distributions. It supports classical 
        EBMs via MCMC sampling and modern flow/diffusion-based generative models.
        
        Key components:
        - Samplers: LangevinDynamics, HamiltonianMonteCarlo, FlowSampler, GradientDescentSampler
        - Losses: ContrastiveDivergence, ScoreMatching, EquilibriumMatchingLoss
        - Interpolants: LinearInterpolant, CosineInterpolant, VariancePreservingInterpolant
        - Integrators: EulerMaruyama, Heun, Leapfrog
        - Models: ConditionalTransformer2D, neural network components
        - Datasets: TwoMoons, EightGaussians, SwissRoll, and more synthetic datasets
      full_output: llms-full.txt
      sections:
        Getting Started:
          - index.md: Main documentation page for TorchEBM
          - tutorials/getting_started.md: Quick start tutorial
        Core Concepts:
          - tutorials/samplers.md: Guide to MCMC samplers
          - tutorials/loss_functions.md: Loss functions for EBM training
          - tutorials/training.md: Training energy-based models
        API Reference:
          - api/torchebm/core/index.md: Core base classes
          - api/torchebm/samplers/index.md: Sampling algorithms
          - api/torchebm/losses/index.md: Training objectives
          - api/torchebm/interpolants/index.md: Interpolation schemes
          - api/torchebm/integrators/index.md: Numerical integrators
          - api/torchebm/models/index.md: Neural network architectures
          - api/torchebm/datasets/index.md: Data generators
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - autorefs
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - tags:
      tags_file: tags.md
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
      fallback_to_build_date: true
  - blog:
      blog_dir: blog
      post_dir: "{blog}/posts"
      post_date_format: yyyy-MM-dd
      post_url_format: "{slug}"
      authors_file: "{blog}/.authors.yml"
      categories: true
      categories_name: Categories
      categories_url_format: "category/{slug}"
      categories_toc: true
      # categories_sort_by: title
      categories_sort_reverse: false
      categories_allowed:
        - Tutorials
        - Research
        - Announcements
        - Examples
      pagination: true
      pagination_per_page: 5
      pagination_format: "$link_first $link_previous $page/$page_count $link_next  $link_last"
      pagination_if_single_page: false
      pagination_keep_content: true
  - literate-nav:
      nav_file: SUMMARY.md
  - autorefs
  - api-autonav:
      modules: ["torchebm"]
      on_implicit_namespace_package: skip
      module_options:
        package.submodule:
          docstring_style: google
          show_signature: false
        ".*":
          heading_level: 1
          show_symbol_type_heading: true
          show_symbol_type_toc: true
      api_root_uri: "api"

  - meta

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: soran-ghaderi
      repo: torchebm
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/soran-ghaderi
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/torchebm/
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/soranghaderi.bsky.social
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/soranghadri
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/soran-ghaderi/
    - icon: fontawesome/brands/google-scholar
      link: https://scholar.google.com/citations?user=-2N2iKcAAAAJ&hl=en
    - icon: fontawesome/brands/researchgate
      link: https://www.researchgate.net/profile/Soran-Ghaderi
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0009-0004-6564-4517
    - icon: material/web
      link: https://soran-ghaderi.github.io/
  version:
    provider: mike
    alias: true
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/cards-clickable.js
  - javascripts/benchmarks.js
