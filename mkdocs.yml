# $schema: https://squidfunk.github.io/mkdocs-material/schema.json

site_name: TorchEBM
site_url: https://soran-ghaderi.github.io/torchebm/
site_description: "Simulation-free, GPU-first generative modeling in PyTorch: composable primitives for scalable, stable training of modern energy-based models, diffusion, flow matching, and Schrödinger bridges."
site_author: Soran Ghaderi
repo_url: https://github.com/soran-ghaderi/torchebm
repo_name: soran-ghaderi/torchebm
edit_uri: edit/master/docs/
copyright: Copyright © 2025 Soran Ghaderi. Licensed under the MIT License.

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/images/penrose_nabla_icon.svg
  favicon: assets/images/penrose_nabla_icon.svg
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.tooltips
    - header.autohide
    - announce.dismiss
    - navigation.footer
  palette:
    # Palette toggle for dark mode (default)
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  font: false
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: fontawesome/solid/note-sticky
      abstract: fontawesome/solid/book
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/bullhorn
      success: fontawesome/solid/check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/bomb
      danger: fontawesome/solid/skull
      bug: fontawesome/solid/robot
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
#  logo: simple/pytorch
#  favicon: simple/pytorch

nav:
  - Home: index.md
  - Getting Started:
    - getting_started/index.md
    - Concepts:
      - concepts/index.md
      - Design and Scope: concepts/design.md
      - The Energy-Based View: concepts/energy_view.md
      - Sampling and Integration: concepts/sampling.md
      - Learning Objectives: concepts/objectives.md
      - Interpolants and Couplings: concepts/transport.md
  - API Reference:
    - api/index.md
  - Examples:
    - Overview: examples/index.md
    - Foundations: examples/00-foundations/index.md
    - Sampling: examples/10-sampling/index.md
    - Training: examples/20-training/index.md
    - Showcase: examples/90-showcase/index.md
  - Developer Guide:
    - Overview: developer_guide/index.md
    - Architecture: developer_guide/architecture.md
    - Code Guidelines: developer_guide/code_guidelines.md
    - Performance and Benchmarking: developer_guide/performance.md
  - Benchmarks: https://soran-ghaderi.github.io/torchebm-benchmarks/
  - Blog: blog/index.md
  - FAQ: faq/index.md

hooks:
  - docs/hooks/socialmedia.py
  - docs/hooks/gen_examples.py
  - docs/hooks/gen_diagrams.py
  - docs/hooks/url_schemes.py

plugins:
  - search
  - literate-nav:
      nav_file: SUMMARY.md
  - redirects:
      redirect_maps:
        benchmarks/index.md: https://soran-ghaderi.github.io/torchebm-benchmarks/
        tutorials/index.md: concepts/index.md
        tutorials/getting_started.md: getting_started/index.md
        tutorials/samplers.md: concepts/sampling.md
        tutorials/loss_functions.md: concepts/objectives.md
        tutorials/training.md: concepts/objectives.md
        tutorials/visualization.md: examples/index.md
        tutorials/custom_neural_networks.md: concepts/energy_view.md
        tutorials/parallel_sampling.md: concepts/sampling.md
        examples/datasets/index.md: examples/index.md
        examples/samplers/index.md: examples/index.md
        examples/training/index.md: examples/index.md
        examples/visualization/index.md: examples/index.md
        examples/models/index.md: concepts/energy_view.md
        developer_guide/getting_started.md: developer_guide/index.md
        developer_guide/profiling.md: developer_guide/performance.md
        developer_guide/benchmarking.md: developer_guide/performance.md
  - llmstxt:
      markdown_description: |
        TorchEBM is a PyTorch library for simulation-free, GPU-first generative
        modeling: scalable, stable training of modern energy-based models, diffusion,
        flow matching, and Schrödinger bridges. Energy-based models define probability
        distributions through a scalar energy function, with lower energy meaning
        higher probability. This formulation is general enough that much of modern
        generative modeling, from MCMC sampling and score matching to simulation-free
        transport along probability paths, factors into the same components: a field,
        a probability path, a coupling, an objective, and an integrator. TorchEBM
        implements these components as composable, high-throughput PyTorch primitives,
        so simulation-free objectives (flow matching, equilibrium matching, denoising
        score matching) and sampling-based objectives (contrastive divergence with
        Langevin or HMC negatives) are unified under one library.

        Key components:
        - Samplers: LangevinDynamics, HamiltonianMonteCarlo, RiemannianManifoldHMC, FlowSampler
        - Losses: ContrastiveDivergence, ScoreMatching, EquilibriumMatchingLoss, EnergyMatchingLoss
        - Interpolants: LinearInterpolant, CosineInterpolant, VariancePreservingInterpolant
        - Couplings: IndependentCoupling, SinkhornCoupling, ExactOTCoupling, ReflowCoupling
        - Integrators: EulerMaruyama, Heun, RK4, Dopri5, Leapfrog, GeneralisedLeapfrog
        - Models: ConditionalTransformer2D, neural network components
        - Datasets: TwoMoons, EightGaussians, SwissRoll, and more synthetic benchmarks
      full_output: llms-full.txt
      sections:
        Getting Started:
          - index.md: Main documentation page for TorchEBM
          - getting_started/index.md: Installation and first workflows
        Concepts:
          - concepts/design.md: The unifying abstraction and method taxonomy
          - concepts/energy_view.md: Energies, scores, and the model contract
          - concepts/sampling.md: MCMC, flow sampling, and integrators
          - concepts/objectives.md: Training objectives from CD to energy matching
          - concepts/transport.md: Interpolants and couplings
        API Reference:
          - api/torchebm/core/index.md: Core base classes
          - api/torchebm/samplers/index.md: Sampling algorithms
          - api/torchebm/losses/index.md: Training objectives
          - api/torchebm/interpolants/index.md: Interpolation schemes
          - api/torchebm/couplings/index.md: Couplings
          - api/torchebm/integrators/index.md: Numerical integrators
          - api/torchebm/models/index.md: Neural network architectures
          - api/torchebm/datasets/index.md: Data generators
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - autorefs
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - tags
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
      fallback_to_build_date: true
  - blog:
      blog_dir: blog
      post_dir: "{blog}/posts"
      post_date_format: yyyy-MM-dd
      post_url_format: "{slug}"
      authors_file: "{blog}/.authors.yml"
      categories: true
      categories_name: Categories
      categories_url_format: "category/{slug}"
      categories_toc: true
      # categories_sort_by: title
      categories_sort_reverse: false
      categories_allowed:
        - Tutorials
        - Research
        - Announcements
        - Examples
      pagination: true
      pagination_per_page: 5
      pagination_format: "$link_first $link_previous $page/$page_count $link_next  $link_last"
      pagination_if_single_page: false
      pagination_keep_content: true
  - mkdocstrings
  - api-autonav:
      modules: ["torchebm"]
      on_implicit_namespace_package: skip
      module_options:
        package.submodule:
          docstring_style: google
          show_signature: false
        ".*":
          heading_level: 1
          show_symbol_type_heading: true
          show_symbol_type_toc: true
      api_root_uri: "api"

  - meta

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: soran-ghaderi
      repo: torchebm
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

