name: "\U0001F680 Feature request"
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes:
      label: What do you want, and why?
      description: >
        One or two paragraphs is plenty. Example usage, papers, or links
        welcome but optional.
      placeholder: |
        A DPM-Solver++ option for FlowSampler so image sampling needs ~20
        steps instead of 200.
    validations:
      required: true
