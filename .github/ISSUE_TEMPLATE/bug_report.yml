name: "\U0001F41E Bug report"
description: Something broken, slow, or wrong in the docs.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: >
        Describe the problem. Paste code, tracebacks, or commands right here -
        no separate fields needed.
      placeholder: |
        Sampling with LangevinDynamics returns NaN when ...

        ```python
        sampler = LangevinDynamics(model, step_size=0.01)
        ```
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Version / environment (optional)
      placeholder: "torchebm 0.6.1, torch 2.12, cuda 13.0, linux"
