name: Update Changelog

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to generate changelog for (e.g. v0.5.10)"
        required: true

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update CHANGELOG.md
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.event.inputs.tag }}
          excludeTypes: ""
          includeInvalidCommits: true
          useGitmojis: false

      - name: Commit CHANGELOG.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: master
          commit_message: "chore: update CHANGELOG.md for ${{ github.event.inputs.tag }} [skip ci]"
          file_pattern: CHANGELOG.md 